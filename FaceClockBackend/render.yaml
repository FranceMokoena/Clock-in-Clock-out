services:
  - type: web
    name: faceclock-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: FaceClockBackend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

